smart_vent_controller:
  set_room_priority:
    name: Set Room Priority
    description: Change the priority of a room for relief vent selection
    fields:
      room:
        name: Room
        description: Room name or key
        required: true
        selector:
          text:
      priority:
        name: Priority
        description: Priority value (0-10)
        required: true
        selector:
          number:
            min: 0
            max: 10
            step: 1

  override_room:
    name: Override Room
    description: Temporarily override room control (exclude from conditioning)
    fields:
      room:
        name: Room
        description: Room name or key
        required: true
        selector:
          text:
      enabled:
        name: Enabled
        description: Enable or disable override
        required: true
        selector:
          boolean:
      duration_min:
        name: Duration (minutes)
        description: How long the override lasts (default 60)
        required: false
        default: 60
        selector:
          number:
            min: 1
            max: 1440
            step: 1

  reset_to_defaults:
    name: Reset to Defaults
    description: Reset all settings to default values

  export_efficiency:
    name: Export Efficiency Data
    description: Export learned per-room efficiency rates to JSON
    fields:
      path:
        name: File Path
        description: Relative path under config dir (leave blank for log output)
        required: false
        selector:
          text:

  import_efficiency:
    name: Import Efficiency Data
    description: Import per-room efficiency rates from JSON
    fields:
      path:
        name: File Path
        description: Relative path under config dir
        required: false
        selector:
          text:
      payload:
        name: JSON Payload
        description: Inline JSON data (alternative to file path)
        required: false
        selector:
          object:
